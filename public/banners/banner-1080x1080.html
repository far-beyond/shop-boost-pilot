<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080,height=1080">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
  body { font-family: 'Noto Sans JP', sans-serif; width: 1080px; height: 1080px; overflow: hidden; }
  .banner {
    width: 1080px; height: 1080px;
    background: linear-gradient(168deg, #0a1628 0%, #0f2140 50%, #1a3a6b 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; overflow: hidden; text-align: center; padding: 80px;
  }
  .banner::before {
    content: ''; position: absolute; top: -100px; right: -100px;
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(41,121,255,0.12) 0%, transparent 70%);
  }
  .banner::after {
    content: ''; position: absolute; bottom: -100px; left: -50px;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(34,197,94,0.08) 0%, transparent 70%);
  }
  .content { z-index: 1; }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(41,121,255,0.2); border: 1px solid rgba(41,121,255,0.3);
    color: #60a5fa; font-size: 16px; font-weight: 700;
    padding: 8px 20px; border-radius: 50px; margin-bottom: 36px;
  }
  .badge svg { width: 18px; height: 18px; }
  h1 { font-size: 56px; font-weight: 900; color: #fff; line-height: 1.3; margin-bottom: 20px; }
  h1 span {
    background: linear-gradient(135deg, #2979ff, #00b4d8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .sub { font-size: 20px; color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 40px; }
  .stats {
    display: flex; gap: 24px; justify-content: center; margin-bottom: 48px;
  }
  .stat-item {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; padding: 20px 28px; text-align: center;
  }
  .stat-value { font-size: 28px; font-weight: 900; color: #2979ff; }
  .stat-label { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 4px; }
  .cta {
    display: inline-flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, #2979ff, #00b4d8);
    color: #fff; font-size: 22px; font-weight: 700;
    padding: 18px 48px; border-radius: 14px;
    box-shadow: 0 8px 32px rgba(41,121,255,0.3);
  }
  .bottom-note {
    margin-top: 20px; font-size: 15px; color: rgba(255,255,255,0.4);
  }
  .logo {
    position: absolute; bottom: 32px; display: flex; align-items: center; gap: 10px;
    color: rgba(255,255,255,0.35); font-size: 16px; font-weight: 700; z-index: 2;
  }
  .logo-icon {
    width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #2979ff, #00b4d8);
  }
  .logo-icon svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; }
</style>
</head>
<body>
<div class="banner">
  <div class="content">
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      AIが30秒で商圏分析
    </div>
    <h1>地図 × AI で、<br><span>集客を、<br>もっと賢く。</span></h1>
    <p class="sub">住所を入力するだけ。<br>商圏分析・チラシ配布・Web広告・<br>MEO対策までAIが自動化。</p>
    <div class="stats">
      <div class="stat-item">
        <div class="stat-value">30秒</div>
        <div class="stat-label">分析完了</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">¥0〜</div>
        <div class="stat-label">無料で開始</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">全国</div>
        <div class="stat-label">対応</div>
      </div>
    </div>
    <div class="cta">無料で商圏分析する →</div>
    <p class="bottom-note">クレカ不要 ・ 登録なしで今すぐ使える</p>
  </div>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
    </div>
    MapBoost AI
  </div>
</div>
</body>
</html>
