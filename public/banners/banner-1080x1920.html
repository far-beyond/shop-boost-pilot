<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080,height=1920">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
  body { font-family: 'Noto Sans JP', sans-serif; width: 1080px; height: 1920px; overflow: hidden; }
  .banner {
    width: 1080px; height: 1920px;
    background: linear-gradient(180deg, #0a1628 0%, #0f2140 40%, #1a3a6b 80%, #0f2140 100%);
    display: flex; flex-direction: column; align-items: center;
    position: relative; overflow: hidden; text-align: center; padding: 100px 60px;
  }
  .banner::before {
    content: ''; position: absolute; top: 200px; right: -100px;
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(41,121,255,0.12) 0%, transparent 70%);
  }
  .content { z-index: 1; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(41,121,255,0.2); border: 1px solid rgba(41,121,255,0.3);
    color: #60a5fa; font-size: 18px; font-weight: 700;
    padding: 10px 24px; border-radius: 50px; margin-bottom: 48px;
  }
  .badge svg { width: 20px; height: 20px; }
  h1 { font-size: 64px; font-weight: 900; color: #fff; line-height: 1.3; margin-bottom: 24px; }
  h1 span {
    background: linear-gradient(135deg, #2979ff, #00b4d8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .sub { font-size: 22px; color: rgba(255,255,255,0.6); line-height: 1.8; margin-bottom: 56px; }
  .features {
    display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 800px; margin-bottom: 56px;
  }
  .feature {
    display: flex; align-items: center; gap: 20px; text-align: left;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; padding: 24px 32px;
  }
  .feature-icon {
    width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    background: linear-gradient(135deg, rgba(41,121,255,0.2), rgba(0,180,216,0.1));
  }
  .feature-icon svg { width: 24px; height: 24px; stroke: #60a5fa; fill: none; stroke-width: 2; }
  .feature-text h3 { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .feature-text p { font-size: 15px; color: rgba(255,255,255,0.5); }
  .stats {
    display: flex; gap: 32px; justify-content: center; margin-bottom: 56px;
  }
  .stat-item { text-align: center; }
  .stat-value { font-size: 36px; font-weight: 900; color: #2979ff; }
  .stat-label { font-size: 14px; color: rgba(255,255,255,0.5); margin-top: 4px; }
  .cta {
    display: inline-flex; align-items: center; gap: 12px;
    background: linear-gradient(135deg, #2979ff, #00b4d8);
    color: #fff; font-size: 24px; font-weight: 700;
    padding: 22px 56px; border-radius: 16px;
    box-shadow: 0 12px 40px rgba(41,121,255,0.3);
  }
  .bottom-note {
    margin-top: 20px; font-size: 16px; color: rgba(255,255,255,0.4);
  }
  .logo {
    position: absolute; bottom: 48px; display: flex; align-items: center; gap: 10px;
    color: rgba(255,255,255,0.35); font-size: 18px; font-weight: 700; z-index: 2;
  }
  .logo-icon {
    width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #2979ff, #00b4d8);
  }
  .logo-icon svg { width: 20px; height: 20px; fill: none; stroke: #fff; stroke-width: 2; }
</style>
</head>
<body>
<div class="banner">
  <div class="content">
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      AIが30秒で商圏分析
    </div>
    <h1>地図 × AI で、<br><span>集客を、<br>もっと賢く。</span></h1>
    <p class="sub">住所を入力するだけ。<br>国勢調査データとAIが、<br>商圏分析・集客施策を自動化。</p>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <div class="feature-text">
          <h3>AI商圏分析</h3>
          <p>人口・世帯・競合を自動マッピング</p>
        </div>
      </div>
      <div class="feature">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        </div>
        <div class="feature-text">
          <h3>Google・Meta広告自動提案</h3>
          <p>広告文・ターゲティングをAIが最適化</p>
        </div>
      </div>
      <div class="feature">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </div>
        <div class="feature-text">
          <h3>発注書PDF自動生成</h3>
          <p>チラシ・広告の発注書をワンクリック</p>
        </div>
      </div>
      <div class="feature">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </div>
        <div class="feature-text">
          <h3>MEO対策・月次レポート</h3>
          <p>Googleマップ上位表示をAIがサポート</p>
        </div>
      </div>
    </div>

    <div class="stats">
      <div class="stat-item">
        <div class="stat-value">30秒</div>
        <div class="stat-label">分析完了</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">¥0〜</div>
        <div class="stat-label">無料で開始</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">全国</div>
        <div class="stat-label">対応</div>
      </div>
    </div>

    <div class="cta">無料で商圏分析する →</div>
    <p class="bottom-note">クレカ不要 ・ 登録なしで今すぐ使える</p>
  </div>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
    </div>
    MapBoost AI
  </div>
</div>
</body>
</html>
