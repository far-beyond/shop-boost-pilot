<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200,height=628">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
  body { font-family: 'Noto Sans JP', sans-serif; width: 1200px; height: 628px; overflow: hidden; }
  .banner {
    width: 1200px; height: 628px;
    background: linear-gradient(135deg, #0a1628 0%, #0f2140 40%, #1a3a6b 100%);
    display: flex; position: relative; overflow: hidden;
  }
  .banner::before {
    content: ''; position: absolute; top: -200px; right: -200px;
    width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(41,121,255,0.15) 0%, transparent 70%);
  }
  .banner::after {
    content: ''; position: absolute; bottom: -150px; left: 100px;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(34,197,94,0.1) 0%, transparent 70%);
  }
  .left { flex: 1; padding: 60px; display: flex; flex-direction: column; justify-content: center; z-index: 1; }
  .right { width: 420px; display: flex; align-items: center; justify-content: center; z-index: 1; padding: 40px; }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(41,121,255,0.2); border: 1px solid rgba(41,121,255,0.3);
    color: #60a5fa; font-size: 14px; font-weight: 700;
    padding: 6px 16px; border-radius: 50px; margin-bottom: 24px; width: fit-content;
  }
  .badge svg { width: 16px; height: 16px; }
  h1 { font-size: 48px; font-weight: 900; color: #fff; line-height: 1.3; margin-bottom: 16px; }
  h1 span {
    background: linear-gradient(135deg, #2979ff, #00b4d8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .sub { font-size: 18px; color: rgba(255,255,255,0.6); line-height: 1.6; margin-bottom: 32px; }
  .cta {
    display: inline-flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, #2979ff, #00b4d8);
    color: #fff; font-size: 18px; font-weight: 700;
    padding: 14px 36px; border-radius: 12px; width: fit-content;
    box-shadow: 0 8px 32px rgba(41,121,255,0.3);
  }
  .stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px; padding: 32px; width: 340px;
  }
  .stat-item { text-align: center; }
  .stat-value { font-size: 32px; font-weight: 900; color: #2979ff; }
  .stat-label { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 4px; }
  .logo {
    position: absolute; bottom: 24px; right: 32px; display: flex; align-items: center; gap: 8px;
    color: rgba(255,255,255,0.4); font-size: 14px; font-weight: 700; z-index: 2;
  }
  .logo-icon {
    width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #2979ff, #00b4d8);
  }
  .logo-icon svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2; }
</style>
</head>
<body>
<div class="banner">
  <div class="left">
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      AIが30秒で商圏分析
    </div>
    <h1>地図 × AI で、<br><span>集客を、もっと賢く。</span></h1>
    <p class="sub">住所を入力するだけ。商圏分析・チラシ配布・<br>Web広告・MEO対策までAIが自動化。</p>
    <div class="cta">
      無料で商圏分析する →
    </div>
  </div>
  <div class="right">
    <div class="stats">
      <div class="stat-item">
        <div class="stat-value">30秒</div>
        <div class="stat-label">分析完了</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">¥0〜</div>
        <div class="stat-label">から始められる</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">全国</div>
        <div class="stat-label">47都道府県</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">AI</div>
        <div class="stat-label">自動提案</div>
      </div>
    </div>
  </div>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
    </div>
    MapBoost AI
  </div>
</div>
</body>
</html>
